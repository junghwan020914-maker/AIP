# Student SAC — Residual (BT/base 컨트롤러 + RL 보정)
#
# 실행:   python scripts\run_experiment.py experiments\student_sac_residual.yaml
# dry-run: python scripts\run_experiment.py experiments\student_sac_residual.yaml --dry-run
#
# 방향: base 컨트롤러(coordinated turn=VP-base, 이후 BT GetStick)가 기본 조종, RL은 residual로 다듬음.
#   env_config.ownship_residual_base=vp → env가 base + residual_scale×RL 적용(비파괴적, config-gated).
# 관측/보상/커리큘럼은 VP-following과 동일(RL은 VP-following 성과로 보상). RL이 coordinated turn을 맨땅에서
# 발견할 필요 없음 = 반복 벽 우회.

name: student_sac_residual
script: train_curriculum

output:
  name: trinity
  tag: sac_residual_v2

env:
  observation_mode: custom
  observation_module: student.my_observation_vp
  target_mode: loiter
  target_behavior_dll: AIP_BASE_target.dll
  reward_module: student.my_reward_vp
  max_engage_time: 60.0
  episode_step_limit: 3600

curriculum:
  stages_module: student.my_curriculum_vp

env_config:
  step_ratio: 6
  # ── ★residual 설정 ──
  ownship_residual_base: vp        # env가 VP-base 컨트롤러를 기본으로, RL을 residual로
  residual_scale: 0.35             # 조합 = base + 0.35×RL
  vp_lead_time: 1.2                # base/관측/보상 VP 리드시간 일치
  wez:
    angle_deg: 2.0
    min_range_m: 152.4
    max_range_m: 914.4
  target_loiter:
    enabled: true
    bank: 15.0
    pitch: 0.0
  reward:
    mode: default
    step_penalty: -0.01
  ownship_randomization:
    enabled: true
    radius: 500.0
    r_roll: 5.0
    r_pitch: 5.0
    r_heading: 15.0

algo:
  name: sac
  framework: torch
  lr: 3.0e-4
  gamma: 0.99
  train_batch_size: 256
  minibatch_size: 256
  tau: 0.005
  target_entropy: auto
  replay_buffer_capacity: 10000
  mlp:
    enabled: true
    fcnet_hiddens: [256, 256]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu

runtime:
  iterations:
  num_env_runners: 1
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  save_lightweight_bundle: true
  lightweight_bundle_frequency: 25
  save_native_checkpoint: false
  native_checkpoint_frequency: 25
  start_stage: 0

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: true
  interval: 30
  steps: 4
  print: true

engagement_log:
  enabled: true
  interval: 100
  steps: 1800
  episodes: 1
  print: true

notes: "SAC Residual. base(VP-base/BT GetStick) + RL 보정. RL이 coordinated turn 맨땅 발견 불필요."
